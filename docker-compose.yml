version: "3.9"

services:
  viddash:
    build: .
    container_name: viddash
    environment:
      - PORT=8000
      - WEB_CONCURRENCY=2
      - GTHREADS=2
      - LOG_LEVEL=info
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/robots.txt"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
