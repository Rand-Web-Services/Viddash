<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UTM Link Pack — Viddash</title>
  <meta name="description" content="Generate a CSV of UTM links for campaigns." />
  <link rel="canonical" href="https://viddash.app/utm-builder" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/static/styles.css" rel="stylesheet" />
</head>
<body>
  {% include "partials/site-header.html" %}

  <header class="py-5 bg-light">
    <div class="container">
      <h1 class="display-5 fw-bold mb-3">UTM Link Pack</h1>
      <p class="lead text-muted">Generate a CSV of tracking URLs for campaigns.</p>
    </div>
  </header>

  <main class="container my-5">
    <div class="row justify-content-center mb-5">
      <div class="col-lg-10">
        <div class="card shadow-sm p-3 p-md-4">
          <form id="utmForm" class="needs-validation">
            <div class="mb-3">
              <label for="baseUrl" class="form-label fw-semibold">Base URL</label>
              <input id="baseUrl" type="url" class="form-control" placeholder="https://example.com/landing" required />
            </div>

            <div class="row g-3">
              <div class="col-md-4">
                <label for="sourceInput" class="form-label fw-semibold">utm_source</label>
                <textarea id="sourceInput" class="form-control" rows="4" placeholder="facebook&#10;instagram"></textarea>
              </div>
              <div class="col-md-4">
                <label for="mediumInput" class="form-label fw-semibold">utm_medium</label>
                <textarea id="mediumInput" class="form-control" rows="4" placeholder="cpc&#10;social"></textarea>
              </div>
              <div class="col-md-4">
                <label for="campaignInput" class="form-label fw-semibold">utm_campaign</label>
                <textarea id="campaignInput" class="form-control" rows="4" placeholder="spring_sale"></textarea>
              </div>
              <div class="col-md-6">
                <label for="contentInput" class="form-label fw-semibold">utm_content (optional)</label>
                <textarea id="contentInput" class="form-control" rows="3" placeholder="ad_a&#10;ad_b"></textarea>
              </div>
              <div class="col-md-6">
                <label for="termInput" class="form-label fw-semibold">utm_term (optional)</label>
                <textarea id="termInput" class="form-control" rows="3" placeholder="keyword1"></textarea>
              </div>
            </div>

            <button id="submitBtn" class="btn btn-primary mt-3" type="submit">Download CSV</button>
            <div id="status" class="form-text mt-2"></div>
          </form>
        </div>
      </div>
    </div>

    <div id="alertBox" class="container mb-3" style="display:none">
      <div class="alert" role="alert"></div>
    </div>
  </main>

  {% include "partials/site-footer.html" %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const form = document.getElementById('utmForm');
    const submitBtn = document.getElementById('submitBtn');
    const statusDiv = document.getElementById('status');
    const alertBox = document.getElementById('alertBox');

    function linesToList(text) {
      return (text || '').split(/\r?\n/).map(v => v.trim()).filter(Boolean);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const baseUrl = document.getElementById('baseUrl').value.trim();
      const source = linesToList(document.getElementById('sourceInput').value);
      const medium = linesToList(document.getElementById('mediumInput').value);
      const campaign = linesToList(document.getElementById('campaignInput').value);
      const content = linesToList(document.getElementById('contentInput').value);
      const term = linesToList(document.getElementById('termInput').value);

      if (!baseUrl || !source.length || !medium.length || !campaign.length) {
        showAlert('Base URL, source, medium, and campaign are required', 'danger');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Generating...';
      statusDiv.textContent = 'Building CSV...';

      try {
        const response = await fetch('/api/utm/csv', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: baseUrl, source, medium, campaign, content, term })
        });

        if (!response.ok) {
          let message = `HTTP ${response.status}`;
          try {
            const err = await response.json();
            if (window.viddashHandleApiAuth?.(err)) {
              message = 'Please sign up to continue.';
            } else {
              message = err.error || message;
            }
          } catch (e) {}
          throw new Error(message);
        }

        const blob = await response.blob();
        const filename = getFilenameFromDisposition(response.headers.get('Content-Disposition')) || 'utm-links.csv';
        downloadFile(blob, filename);
        showAlert('CSV ready! Download should start automatically.', 'success');
      } catch (err) {
        showAlert(`Error: ${err.message}`, 'danger');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Download CSV';
        statusDiv.textContent = '';
      }
    });

    function getFilenameFromDisposition(header) {
      if (!header) return null;
      const match = /filename=\"?([^\";]+)\"?/i.exec(header);
      return match ? match[1] : null;
    }

    function downloadFile(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function showAlert(message, type = 'info') {
      const alert = alertBox.querySelector('.alert');
      alert.textContent = message;
      alert.className = `alert alert-${type}`;
      alertBox.style.display = 'block';
      setTimeout(() => {
        alertBox.style.display = 'none';
      }, 5000);
    }
  </script>
</body>
</html>
